// ── De-vig algorithms ─────────────────────────────────────────────────
function multiplicativeDevig(decOdds) {
  const r = decOdds.map(o => 1/o);
  const B = r.reduce((a,b) => a+b, 0);
  return r.map(ri => ri/B);
}

function powerDevig(decOdds) {
  const r = decOdds.map(o => 1/o);
  // Find tau such that sum(r_i^(1/tau)) = 1, binary search on 1/tau = k (k > 1 since B > 1)
  let lo = 1.0, hi = 20.0;
  for (let iter = 0; iter < 60; iter++) {
    const mid = (lo + hi) / 2;
    const s = r.reduce((a, ri) => a + Math.pow(ri, mid), 0);
    if (s > 1) lo = mid; else hi = mid;
  }
  const k = (lo + hi) / 2;
  const raw = r.map(ri => Math.pow(ri, k));
  const s = raw.reduce((a,b) => a+b, 0);
  return raw.map(x => x/s);
}

function shinDevig(decOdds) {
  const r = decOdds.map(o => 1/o);
  const B = r.reduce((a,b) => a+b, 0);
  let pi = r.map(ri => ri/B);
  for (let iter = 0; iter < 200; iter++) {
    const piSqSum = pi.reduce((a,x) => a+x*x, 0);
    const z = (B - 1) / (B - piSqSum);
    const newPi = r.map(ri => {
      const disc = z*z + 4*(1-z)*ri/B;
      return (Math.sqrt(disc) - z) / (2*(1-z));
    });
    const norm = newPi.reduce((a,b) => a+b, 0);
    const piNext = newPi.map(x => x/norm);
    const diff = pi.reduce((a, x, i) => a + Math.abs(x - piNext[i]), 0);
    pi = piNext;
    if (diff < 1e-10) break;
  }
  return pi;
}

function devig(decOdds, method) {
  if (method === 'shin') return shinDevig(decOdds);
  if (method === 'power') return powerDevig(decOdds);
  return multiplicativeDevig(decOdds);
}

// ── Smoczynski–Tomkins Kelly allocator ───────────────────────────────
// Fixed-odds formulation: D=1, β_k = 1/o_k, O_k = o_k
// f_k* = p_k − b/o_k  for k in active set S
// b = Σ_{k∉S} p_k / (1 − Σ_{k∈S} 1/o_k)
// Inclusion: e_k = p_k·o_k > b
function smocTomkinsKelly(probs, decOdds) {
  const n = probs.length;
  const horses = probs.map((p, i) => ({ p, o: decOdds[i], e: p * decOdds[i], idx: i }));
  horses.sort((a, b) => b.e - a.e);

  let activeSet = [];
  let b = 1;

  for (const h of horses) {
    const trial = [...activeSet, h];
    const sumBetaS = trial.reduce((a, x) => a + 1/x.o, 0);
    const denom = 1 - sumBetaS;
    if (denom <= 1e-9) break; // sum of 1/o_k approaching 1, can't include more
    const sumP_notS = probs.reduce((a, p, i) => {
      return trial.some(x => x.idx === i) ? a : a + p;
    }, 0);
    const bNew = sumP_notS / denom;
    if (h.e > bNew) {
      activeSet = trial;
      b = bNew;
    } else {
      break;
    }
  }

  const stakes = new Array(n).fill(0);
  let totalStake = 0;
  for (const h of activeSet) {
    const f = h.p - b / h.o;
    stakes[h.idx] = Math.max(0, f);
    totalStake += stakes[h.idx];
  }
  return { stakes, reserve: b, totalStake };
}

// ── Calculate ─────────────────────────────────────────────────────────
function calculate() {
  const bankroll = parseFloat(document.getElementById('bankroll').value) || 1000;
  const alpha = parseFloat(document.getElementById('alpha').value);
  const devigMethod = document.getElementById('devig').value;

  const raceResults = [];
  let grandTotalFrac = 0;

  for (const race of races) {
    const validHorses = race.horses.filter(h => h.name.trim() !== '' && parseFloat(h.odds) > 1);
    if (validHorses.length === 0) continue;

    const decOdds = validHorses.map(h => parseFloat(h.odds));
    const marketProbs = devig(decOdds, devigMethod);

    // Use user's probability if provided, else fall back to market prob
    const probs = validHorses.map((h, i) => {
      const up = parseFloat(h.myProb);
      return (!isNaN(up) && up > 0) ? up / 100 : marketProbs[i];
    });

    // Normalize user probs to sum to 1 within the race (only for horses user specified)
    const probSum = probs.reduce((a,b) => a+b, 0);
    const normProbs = probs.map(p => p / probSum);

    const { stakes, totalStake } = smocTomkinsKelly(normProbs, decOdds);

    const horses = validHorses.map((h, i) => ({
      name: h.name,
      odds: decOdds[i],
      marketProb: marketProbs[i],
      myProb: normProbs[i],
      userOverride: !isNaN(parseFloat(h.myProb)) && parseFloat(h.myProb) > 0,
      edge: normProbs[i] * decOdds[i] - 1,
      fullKellyF: stakes[i],
      alphaF: stakes[i] * alpha,
    }));

    const raceTotalFrac = horses.reduce((a, h) => a + h.alphaF, 0);
    grandTotalFrac += raceTotalFrac;
    raceResults.push({ name: race.name, horses, raceTotalFrac });
  }

  // Scale down if total allocation > 1 (approximate for independent races)
  const scaleFactor = grandTotalFrac > 1 ? 1 / grandTotalFrac : 1;
  if (scaleFactor < 1) {
    raceResults.forEach(r => {
      r.horses.forEach(h => { h.alphaF *= scaleFactor; });
      r.raceTotalFrac *= scaleFactor;
    });
    grandTotalFrac = 1;
  }

  renderResults(raceResults, bankroll, alpha, grandTotalFrac, scaleFactor < 1);
}

function pct(f) { return (f * 100).toFixed(1) + '%'; }
function gbp(f, bankroll) { return '£' + (f * bankroll).toFixed(2); }
function edgeColor(e) {
  if (e > 0.05) return 'text-emerald-400';
  if (e > 0) return 'text-emerald-600';
  if (e > -0.05) return 'text-gray-500';
  return 'text-red-500';
}

          <span class="font-semibold text-emerald-400">${gbp(grandTotalFrac, bankroll)} <span class="text-gray-500 font-normal">(${pct(grandTotalFrac)} of bankroll)</span></span>
        </div>
      </div>
      ${scaled ? `<div class="mb-4 text-xs text-amber-400 bg-amber-400/10 border border-amber-400/20 rounded-xl px-4 py-2">⚠ Total allocation exceeded 100% — stakes scaled down proportionally across races.</div>` : ''}
      ${!anyBet ? `<div class="text-gray-500 text-sm">No positive-edge bets found. Try entering your own probability estimates that differ from the market.</div>` : ''}
  `;

  for (const race of raceResults) {
    const bets = race.horses.filter(h => h.alphaF > 0.0001);
    html += `
      <div class="mb-6">
        <div class="flex items-center gap-2 mb-3">

        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead>
              <tr class="text-left text-gray-600 border-b border-gray-800">
                <th class="pb-1.5 pr-3 font-medium">Horse</th>
                <th class="pb-1.5 pr-3 font-medium">Odds</th>
                <th class="pb-1.5 pr-3 font-medium">Market Prob</th>
                <th class="pb-1.5 pr-3 font-medium">My Prob</th>
                <th class="pb-1.5 pr-3 font-medium">Edge</th>
                <th class="pb-1.5 pr-3 font-medium">Full Kelly f*</th>
                <th class="pb-1.5 pr-3 font-medium">α·f* (${alpha === 0.25 ? '¼' : alpha === 0.33 ? '⅓' : alpha === 0.5 ? '½' : '1'} Kelly)</th>
                <th class="pb-1.5 font-medium text-right">Stake</th>
              </tr>
            </thead>
            <tbody>
    `;
    for (const h of race.horses) {
      const isBet = h.alphaF > 0.0001;
      html += `
        <tr class="border-b border-gray-800/40 ${isBet ? 'bg-emerald-900/10' : ''}">
          <td class="py-2 pr-3 font-medium ${isBet ? 'text-emerald-300' : 'text-gray-400'}">${escHtml(h.name)}</td>
          <td class="py-2 pr-3 text-gray-300">${h.odds.toFixed(2)}</td>
          <td class="py-2 pr-3 text-gray-400">${pct(h.marketProb)}</td>
          <td class="py-2 pr-3 ${h.userOverride ? 'text-sky-400' : 'text-gray-500'}">${pct(h.myProb)}${h.userOverride ? ' ✎' : ''}</td>
          <td class="py-2 pr-3 ${edgeColor(h.edge)}">${h.edge >= 0 ? '+' : ''}${(h.edge * 100).toFixed(1)}%</td>
          <td class="py-2 pr-3 ${isBet ? 'text-gray-300' : 'text-gray-700'}">${isBet ? pct(h.fullKellyF) : '—'}</td>
          <td class="py-2 pr-3 ${isBet ? 'text-emerald-400 font-medium' : 'text-gray-700'}">${isBet ? pct(h.alphaF) : '—'}</td>
          <td class="py-2 text-right font-semibold ${isBet ? 'text-emerald-400' : 'text-gray-700'}">${isBet ? gbp(h.alphaF, bankroll) : '—'}</td>
        </tr>
      `;
    }
    html += `</tbody></table></div></div>`;
  }

  html += `
      <div class="mt-4 pt-4 border-t border-gray-800 text-xs text-gray-600 space-y-1">
        <p>• <strong class="text-gray-500">My Prob ✎</strong> = you overrode the market probability. Leave blank to use de-vigged market odds as the probability estimate (edge will be ~0, no bets suggested).</p>
        <p>• <strong class="text-gray-500">Edge</strong> = my_prob × decimal_odds − 1. Positive means you think this horse is mispriced.</p>
        <p>• Odds shown are ante-post / illustrative. Update with race-day bookmaker prices before staking.</p>
        <p>• Smoczynski–Tomkins (2010) closed-form Kelly · de-vig: Shin iterative method.</p>
      </div>
    </div>
  `;

  el.innerHTML = html;
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Init ──────────────────────────────────────────────────────────────
INITIAL_RACES.forEach(r => {
  races.push({
    id: nextRaceId++,
    name: r.name,
    horses: r.horses.map(h => ({ name: h.name, odds: h.odds, myProb: '' }))
  });
});
renderRaces();
</script>
</body>
</html>
